<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>WA Logs — ReachOut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
:root { --accent: #25d366; --accent2: #128c7e; }
.log-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.log-row:last-child { border-bottom: none; }
.log-row:hover { background: rgba(255,255,255,.02); }
.log-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #0c0f14;
}
.log-main { flex: 1; min-width: 0; }
.log-name    { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-detail  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.log-error-msg { font-size: 11px; color: var(--danger); margin-top: 3px; word-break: break-word; }
.log-right { text-align: right; flex-shrink: 0; }
.log-time  { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; }
.filter-bar { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-chip {
  padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s;
}
.filter-chip.active { background: rgba(37,211,102,.1); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="app-layout">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">Reach<span>Out</span></div>
  <div class="sidebar-section">Menu</div>
  <a class="sidebar-item" href="index.html"><span class="si-icon">📋</span> Dashboard</a>
  <a class="sidebar-item" href="send.html"><span class="si-icon">📤</span> Send Emails</a>
  <a class="sidebar-item" href="whatsapp.html"><span class="si-icon">💬</span> WhatsApp</a>
  <a class="sidebar-item active" href="whatsapp_logs.html"><span class="si-icon">📝</span> WA Logs</a>
  <a class="sidebar-item" href="jobs.html"><span class="si-icon">🔍</span> Job Hunt</a>
  <a class="sidebar-item" href="template.html"><span class="si-icon">✏️</span> Template</a>
  <a class="sidebar-item" href="profile.html"><span class="si-icon">👤</span> Profile</a>
  <a class="sidebar-item" href="settings.html"><span class="si-icon">🎨</span> Settings</a>
  <div class="sidebar-bottom">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name"  id="sidebar-name">Loading…</div>
        <div class="sidebar-user-email" id="sidebar-email">…</div>
      </div>
    </div>
    <button class="sidebar-logout" id="logout-btn">Logout</button>
  </div>
</aside>

<header class="app-header">
  <div class="app-header-inner">
    <div class="header-title">📝 WA Logs</div>
    <button class="btn btn-danger btn-sm" onclick="clearLogs()" id="clearBtn">Clear All</button>
  </div>
</header>

<main class="page-content">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;" class="hide-mobile">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;">WhatsApp Logs</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px;">History of all WhatsApp messages sent</div>
    </div>
    <button class="btn btn-danger" onclick="clearLogs()">🗑 Clear All</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" style="margin-bottom:16px;">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value blue" id="lTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Sent</div><div class="stat-value green" id="lSent">—</div></div>
    <div class="stat-card"><div class="stat-label">Failed</div><div class="stat-value red" id="lFailed">—</div></div>
    <div class="stat-card"><div class="stat-label">Success %</div><div class="stat-value green" id="lRate">—</div></div>
  </div>

  <!-- Logs Card -->
  <div class="card">
    <!-- Filter bar -->
    <div class="filter-bar">
      <input type="text" class="form-input" id="searchLogs" placeholder="Search name or company…" oninput="filterLogs()" style="flex:1;min-width:160px;margin:0;padding:7px 12px;font-size:12px;">
      <button class="filter-chip active" data-filter="all"    onclick="setFilter('all',this)">All</button>
      <button class="filter-chip"        data-filter="sent"   onclick="setFilter('sent',this)">Sent</button>
      <button class="filter-chip"        data-filter="failed" onclick="setFilter('failed',this)">Failed</button>
    </div>

    <div id="logsContainer"><div class="spinner"></div></div>
  </div>

</main>
</div>

<nav class="bottom-nav">
  <a class="bn-item" href="index.html"><div class="bn-icon-wrap">📋</div><span class="bn-label">Home</span></a>
  <a class="bn-item" href="send.html"><div class="bn-icon-wrap">📤</div><span class="bn-label">Send</span></a>
  <a class="bn-item" href="jobs.html"><div class="bn-icon-wrap">🔍</div><span class="bn-label">Jobs</span></a>
  <a class="bn-item active" href="whatsapp.html"><div class="bn-icon-wrap">💬</div><span class="bn-label">WhatsApp</span></a>
  <a class="bn-item" href="profile.html"><div class="bn-icon-wrap">👤</div><span class="bn-label">Profile</span></a>
</nav>

<div id="toast-container"></div>

<script type="module">
import { sb, setupPage, toast, esc } from './app.js';

const session = await setupPage('whatsapp_logs.html');
if (!session) throw new Error('No session');
document.getElementById('logout-btn')?.addEventListener('click', async () => { await sb.auth.signOut(); location.href = 'login.html'; });

let allLogs     = [];
let activeFilter= 'all';

async function loadLogs() {
  const { data } = await sb.from('whatsapp_logs').select('*').order('sent_at', { ascending: false });
  allLogs = data || [];
  updateStats();
  renderLogs();
}

function updateStats() {
  const total  = allLogs.length;
  const sent   = allLogs.filter(l => l.status === 'sent').length;
  const failed = allLogs.filter(l => l.status === 'failed').length;
  document.getElementById('lTotal').textContent  = total;
  document.getElementById('lSent').textContent   = sent;
  document.getElementById('lFailed').textContent = failed;
  document.getElementById('lRate').textContent   = total > 0 ? Math.round((sent/total)*100) + '%' : '—';
}

function getFiltered() {
  const q = document.getElementById('searchLogs').value.toLowerCase();
  return allLogs.filter(l => {
    if (activeFilter !== 'all' && l.status !== activeFilter) return false;
    if (q && !(l.name||'').toLowerCase().includes(q) && !(l.company||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderLogs() {
  const c = document.getElementById('logsContainer');
  const data = getFiltered();
  if (!data.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No logs found</div><div class="empty-sub">Send some WhatsApp messages first.</div></div>';
    return;
  }
  c.innerHTML = data.map(l => {
    const isSent = l.status === 'sent';
    const ts = l.sent_at ? new Date(l.sent_at).toLocaleString('en-IN', { dateStyle:'short', timeStyle:'short' }) : '';
    return `<div class="log-row">
      <div class="log-avatar">${(l.name||'?')[0].toUpperCase()}</div>
      <div class="log-main">
        <div class="log-name">${esc(l.name)}</div>
        <div class="log-detail">${esc(l.company)} · ${esc(l.phone)}</div>
        ${!isSent && l.error ? `<div class="log-error-msg">⚠️ ${esc(l.error)}</div>` : ''}
      </div>
      <div class="log-right">
        <span class="badge ${isSent ? 'badge-wa' : 'badge-failed'}">${isSent ? 'Sent' : 'Failed'}</span>
        <div class="log-time">${ts}</div>
      </div>
    </div>`;
  }).join('');
}

window.filterLogs = renderLogs;

window.setFilter = (f, el) => {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLogs();
};

window.clearLogs = async () => {
  if (!confirm('Clear all WhatsApp logs? This cannot be undone.')) return;
  const btn = document.getElementById('clearBtn');
  btn.disabled = true; btn.textContent = 'Clearing…';
  const { error } = await sb.from('whatsapp_logs').delete().neq('id', 0);
  btn.disabled = false; btn.textContent = 'Clear All';
  if (error) toast('❌ ' + error.message, 'error');
  else { toast('🗑 Logs cleared', 'success'); loadLogs(); }
};

loadLogs();
</script>
</body>
</html>
